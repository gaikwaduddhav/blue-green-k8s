<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Green Deployment</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #022c22;
      color: white;
    }

    header {
      background: #065f46;
      padding: 20px;
      text-align: center;
      font-size: 24px;
    }

    .container {
      padding: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      color: black;
      width: 250px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      text-align: center;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      background: #065f46;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #047857;
    }
  </style>
</head>
<body>

<header>🟢 Green Deployment (v2)</header>

<div class="container">
  <div class="card">
    <h3>Feature 1</h3>
    <p>Improved UI with cards.</p>
    <button>Explore</button>
  </div>

  <div class="card">
    <h3>Feature 2</h3>
    <p>Interactive buttons added.</p>
    <button>Click Me</button>
  </div>

  <div class="card">
    <h3>Feature 3</h3>
    <p>Better layout and styling.</p>
    <button>Learn More</button>
  </div>
</div>

</body>
</html>
